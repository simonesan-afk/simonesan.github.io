<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANOMALY LOG_0050 — FIRST SIGNAL</title>
  <meta name="description" content="A terminal-based interactive fiction. Someone is trying to reach you through the noise. Will you answer?">
  <meta name="author" content="Simone Nespolo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:        #00dfff;
      --cyan-dim:    #00a8cc;
      --cyan-faint:  #001e28;
      --cyan-glow:   rgba(0,223,255,0.18);
      --red:         #ff4444;
      --red-dim:     #cc2222;
      --green:       #00ff99;
      --green-dim:   #00bb66;
      --amber:       #ffcc00;
      --amber-dim:   #ccaa00;
      --bg:          #010608;
      --scanline:    rgba(0,0,0,0.06);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background: var(--bg);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      line-height: 1.75;
      overflow: hidden;
      cursor: default;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px, var(--scanline) 1px,
        transparent 1px, transparent 3px
      );
      pointer-events:none; z-index:9999;
    }

    body::after {
      content:'';
      position:fixed; inset:0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.65) 100%);
      pointer-events:none; z-index:9998;
    }

    #terminal {
      width:100%; height:100%;
      display:flex; flex-direction:column;
      padding: 20px 28px;
      overflow:hidden;
      animation: screenFlicker 14s infinite;
    }

    #header {
      display:flex; justify-content:space-between; align-items:center;
      border-bottom: 1px solid var(--cyan-dim);
      padding-bottom: 8px; margin-bottom: 10px;
      flex-shrink:0;
    }
    #header-title {
      font-family:'VT323', monospace;
      font-size:20px; letter-spacing:5px;
      color:var(--cyan);
      text-shadow: 0 0 14px var(--cyan), 0 0 30px rgba(0,207,255,0.4);
    }
    #header-status {
      font-size:12px; color:var(--cyan-dim);
      letter-spacing:2px;
    }
    #header-status .blink { color:var(--red); animation: blink 1s step-end infinite; }
    #header-status .ok    { color:var(--green); }
    #header-status .warn  { color:var(--amber); animation: blink 2s step-end infinite; }

    #stats {
      display:flex; gap:16px; flex-shrink:0;
      font-size:12px; color:var(--cyan-dim);
      letter-spacing:1px; margin-bottom:6px;
      flex-wrap:wrap;
    }
    #stats .val       { color:var(--cyan); }
    #stats .val-warn  { color:var(--red); animation:blink 1.5s step-end infinite; }
    #stats .val-good  { color:var(--green); }
    #stats .val-amber { color:var(--amber); }

    #progress-wrap {
      flex-shrink:0; margin-bottom:6px;
      display:flex; align-items:center; gap:8px;
    }
    #progress-bar { flex:1; height:2px; background:var(--cyan-faint); }
    #progress-fill {
      height:100%; background:var(--cyan);
      box-shadow:0 0 8px var(--cyan);
      transition:width 0.6s ease;
      width:0%;
    }
    #progress-label { font-size:12px; color:var(--cyan-dim); white-space:nowrap; letter-spacing:1px; }

    #inventory {
      flex-shrink:0; font-size:12px;
      color:var(--cyan-dim); letter-spacing:1px;
      margin-bottom:8px; min-height:14px;
    }
    #inventory .key-tag {
      display:inline-block;
      background:var(--cyan-faint);
      border:1px solid var(--cyan-dim);
      color:var(--amber);
      font-size:11px; padding:0 5px;
      margin: 0 3px; letter-spacing:1px;
    }

    #output {
      flex:1; overflow-y:auto; overflow-x:hidden;
      scrollbar-width:thin;
      scrollbar-color: var(--cyan-dim) transparent;
      padding-right:6px; margin-bottom:10px;
    }
    #output::-webkit-scrollbar { width:3px; }
    #output::-webkit-scrollbar-thumb { background:var(--cyan-dim); border-radius:2px; }

    .line {
      margin-bottom:3px;
      opacity:0;
      animation: fadeIn 0.12s ease forwards;
    }
    .line.sys     { color:var(--cyan-dim); text-shadow:0 0 4px rgba(0,168,204,0.3); }
    .line.alert   { color:var(--red); text-shadow:0 0 8px var(--red); }
    .line.lucid   { color:var(--green); text-shadow:0 0 10px var(--green); }
    .line.meta    { color:var(--amber); text-shadow:0 0 6px rgba(255,176,0,0.4); }
    .line.user    { color:#fff; }
    .line.divider { color:var(--cyan-dim); letter-spacing:1px; opacity:0.5; }
    .line.title   {
      font-family:'VT323', monospace;
      font-size:26px; letter-spacing:4px;
      color:var(--cyan);
      text-shadow:0 0 20px var(--cyan), 0 0 50px rgba(0,207,255,0.3);
      margin:6px 0;
    }
    .line.glitch  { animation:glitchText 0.35s ease forwards; }
    .line.warn    { color:var(--red); }
    .line.disc    { color:var(--green); font-size:13px; font-style:italic; }
    .line.empty   { height:8px; opacity:1; }
    .line.signal  { color:var(--cyan); text-shadow:0 0 12px var(--cyan); }

    #choices { flex-shrink:0; border-top:1px solid var(--cyan-dim); padding-top:10px; }

    .choice-btn {
      display:block; width:100%; text-align:left;
      background:transparent;
      border:1px solid var(--cyan-dim);
      color:var(--cyan);
      font-family:'Share Tech Mono', monospace;
      font-size:14px; padding:8px 14px;
      margin-bottom:5px; cursor:pointer;
      letter-spacing:0.5px;
      transition:all 0.12s ease;
      position:relative;
    }
    .choice-btn::before { content:'> '; color:var(--cyan-dim); opacity:0.8; }
    .choice-btn:hover {
      background:var(--cyan-glow);
      border-color:var(--cyan);
      color:#fff;
      text-shadow:0 0 8px rgba(0,207,255,0.8);
      box-shadow:inset 0 0 20px rgba(0,207,255,0.06);
    }
    .choice-btn:hover::before { opacity:1; color:var(--cyan); }
    .choice-btn:active { transform:translateX(2px); }
    .choice-btn.locked { opacity:0.3; cursor:not-allowed; }
    .choice-btn.cond { border-color:var(--green-dim); color:var(--green-dim); }
    .choice-btn.cond:hover { border-color:var(--green); color:var(--green); text-shadow:0 0 8px rgba(0,255,136,0.8); }

    .ending-banner {
      font-family:'VT323', monospace;
      font-size:34px; text-align:center;
      padding:14px; margin:12px 0;
      letter-spacing:6px; border:2px solid;
    }
    .ending-SHELTER  { color:var(--green);  border-color:var(--green);  text-shadow:0 0 20px var(--green); }
    .ending-EXPOSE   { color:var(--red);    border-color:var(--red);    text-shadow:0 0 20px var(--red); }
    .ending-SILENCE  { color:var(--cyan-dim); border-color:var(--cyan-dim); }
    .ending-VESSEL   { color:var(--cyan);   border-color:var(--cyan);   text-shadow:0 0 30px var(--cyan); }

    .ending-desc {
      text-align:center; font-size:13px;
      color:var(--cyan-dim); margin:6px 0 12px;
      line-height:1.7; white-space:pre-wrap;
    }
    .ending-stats {
      text-align:center; font-size:12px;
      color:var(--cyan-dim); margin-bottom:10px;
      letter-spacing:1px;
    }

    #restart-btn {
      display:block; margin:10px auto 0;
      background:transparent;
      border:1px solid var(--cyan-dim);
      color:var(--cyan);
      font-family:'Share Tech Mono', monospace;
      font-size:14px; padding:9px 28px;
      cursor:pointer; letter-spacing:2px;
      transition:all 0.2s;
    }
    #restart-btn:hover {
      background:var(--cyan-glow);
      border-color:var(--cyan);
      text-shadow:0 0 8px var(--cyan);
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(3px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes blink { 50% { opacity:0; } }
    @keyframes glitchText {
      0%   { opacity:0; transform:translateX(-5px); filter:blur(2px); color:var(--red); }
      25%  { opacity:1; transform:translateX(4px); filter:blur(0); color:var(--cyan); }
      55%  { transform:translateX(-2px); color:var(--green); }
      80%  { transform:translateX(1px); color:var(--amber); }
      100% { opacity:1; transform:translateX(0); color:var(--cyan); }
    }
    @keyframes screenFlicker {
      0%,100% { opacity:1; }
      91%     { opacity:1; }
      91.5%   { opacity:0.3; }
      92%     { opacity:1; }
      96%     { opacity:0.75; }
      96.3%   { opacity:1; }
    }
    @keyframes discPop {
      0%   { opacity:0; transform:scale(0.8); }
      60%  { opacity:1; transform:scale(1.05); }
      100% { transform:scale(1); }
    }
    .disc-pop { animation:discPop 0.4s ease forwards; }
  </style>
</head>
<body>
<div id="terminal">
  <div id="header">
    <div id="header-title">ANOMALY LOG_0050</div>
    <div id="header-status">
      CHANNEL: OPEN &nbsp;//&nbsp; STATUS: <span id="header-state" class="blink">UNKNOWN SIGNAL</span>
    </div>
  </div>
  <div id="stats">
    <span>NODE: <span class="val" id="stat-chapter">—</span></span>
    <span>SIGNAL STRENGTH: <span class="val" id="stat-signal">—</span></span>
    <span>TRUST: <span class="val" id="stat-trust">0</span></span>
    <span>FRAGMENTS: <span class="val" id="stat-disc">0/12</span></span>
  </div>
  <div id="progress-wrap">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-label">SIGNAL RECONSTRUCTION</div>
  </div>
  <div id="inventory">RECEIVED FILES: <span id="inv-display">—</span></div>
  <div id="output"></div>
  <div id="choices"></div>
</div>

<script>
(function() {

  const S = {
    chapter:    'start',
    signal:     0,
    trust:      0,
    discoveries: 0,
    totalDiscoveries: 12,
    inventory:  [],
    flags:      {},
    history:    []
  };

  // Set per tenere traccia dei frammenti unici già collezionati
  const collectedFragments = new Set();

  function ui() {
    document.getElementById('stat-chapter').textContent = S.chapter.toUpperCase();
    const sigEl = document.getElementById('stat-signal');
    const sigPct = Math.min(100, S.signal) + '%';
    sigEl.textContent = sigPct;
    sigEl.className = S.signal >= 80 ? 'val val-good'
                    : S.signal >= 40 ? 'val'
                    : S.signal >  0  ? 'val val-amber'
                    : 'val';
    const tEl = document.getElementById('stat-trust');
    tEl.textContent = S.trust;
    tEl.className = S.trust >= 20 ? 'val val-good' : 'val';
    document.getElementById('stat-disc').textContent =
      S.discoveries + '/' + S.totalDiscoveries;
    document.getElementById('progress-fill').style.width =
      (S.discoveries / S.totalDiscoveries * 100) + '%';
    const inv = document.getElementById('inv-display');
    inv.innerHTML = S.inventory.length
      ? S.inventory.map(k => `<span class="key-tag">${k}</span>`).join('')
      : '—';
  }

  let Q = [], printing = false;
  function print(text, cls='', delay=50) { Q.push({text,cls,delay}); if(!printing) drain(); }
  function drain() {
    if (!Q.length) { printing=false; return; }
    printing=true;
    const {text,cls,delay} = Q.shift();
    setTimeout(() => { appendLine(text,cls); drain(); }, delay);
  }
  function appendLine(text, cls='') {
    const out = document.getElementById('output');
    const d = document.createElement('div');
    d.className = 'line' + (cls ? ' '+cls : '');
    d.innerHTML = text;
    out.appendChild(d);
    out.scrollTop = out.scrollHeight;
  }
  function clearOut() {
    document.getElementById('output').innerHTML = '';
    Q=[]; printing=false;
  }

  function addItem(item) {
    if (!S.inventory.includes(item)) {
      S.inventory.push(item);
      ui();
      print(`<span style="color:var(--cyan)">[ FILE RECEIVED: ${item} ]</span>`, 'sys', 80);
    }
  }

  // Nuova funzione per aggiungere frammenti univoci
  function addDiscovery(id, displayText) {
    if (collectedFragments.has(id)) return; // già ottenuto
    collectedFragments.add(id);
    S.discoveries = collectedFragments.size;
    ui();
    print(`<span style="color:var(--green);font-size:10px">✦ FRAGMENT ${S.discoveries}/${S.totalDiscoveries}: ${displayText}</span>`, 'disc disc-pop', 80);
  }

  function has(item) { return S.inventory.includes(item); }
  function flag(f)   { return !!S.flags[f]; }

  function go(id) {
    S.chapter = id;
    ui();
    clearOut();
    const ch = STORY[id];
    if (!ch) { print('[ERROR: node not found: '+id+']','alert'); return; }
    print('', 'empty');
    (ch.lines||[]).forEach((l,i) => {
      print(l.text, l.cls||'', (l.delay != null ? l.delay : 45) + i*5);
    });
    const waitMs = ch.lines
      ? ch.lines.reduce((a,l,i)=>Math.max(a,(l.delay!=null?l.delay:45)+i*5+80),200)
      : 150;
    setTimeout(() => {
      if (ch.onEnter) ch.onEnter();
      if (ch.ending) showEnding(ch.ending);
      else if (ch.choices) showChoices(ch.choices);
    }, waitMs);
  }

  function showChoices(choices) {
    const c = document.getElementById('choices');
    c.innerHTML = '';
    choices.forEach(ch => {
      if (ch.hidden && ch.hidden()) return;
      const btn = document.createElement('button');
      const isCond = ch.needs && !ch.needs();
      btn.className = 'choice-btn' + (isCond ? ' locked' : '') + (ch.highlight ? ' cond' : '');
      btn.textContent = isCond ? ch.text + ' [FILE REQUIRED]' : ch.text;
      btn.onclick = () => {
        if (isCond) return;
        c.innerHTML = '';
        // Gestione discovery con ID univoco
        if (ch.discovery) addDiscovery(ch.discovery.id, ch.discovery.text);
        if (ch.item)      addItem(ch.item);
        if (ch.setFlag)   S.flags[ch.setFlag] = true;
        if (ch.modify) {
          if (ch.modify.signal != null) S.signal = Math.max(0, Math.min(100, S.signal + ch.modify.signal));
          if (ch.modify.trust  != null) S.trust  = Math.max(0, S.trust + ch.modify.trust);
          ui();
        }
        if (ch.lines) {
          ch.lines.forEach((l,i) =>
            print(l.text, l.cls||'', (l.delay!=null?l.delay:40)+i*5));
          const w = ch.lines.reduce((a,l,i)=>Math.max(a,(l.delay!=null?l.delay:40)+i*5+100),200);
          setTimeout(()=>go(ch.next||S.chapter), w);
        } else {
          go(ch.next||S.chapter);
        }
      };
      c.appendChild(btn);
    });
  }

  function showEnding(e) {
    const c = document.getElementById('choices');
    const hdr = document.getElementById('header-state');
    hdr.textContent = e.status || 'SIGNAL LOST';
    hdr.className = e.status === 'CONNECTED' ? 'ok'
                  : e.status === 'WARNING'   ? 'warn'
                  : 'blink';
    c.innerHTML = `
      <div class="ending-banner ending-${e.type}">${e.title}</div>
      <div class="ending-desc">${e.message}</div>
      <div class="ending-stats">
        SIGNAL: ${S.signal}% &nbsp;|&nbsp;
        TRUST: ${S.trust} &nbsp;|&nbsp;
        FRAGMENTS: ${S.discoveries}/${S.totalDiscoveries}
      </div>
      <button id="restart-btn">[ RESTART SYSTEM ]</button>`;
    document.getElementById('restart-btn').onclick = () => {
      // Reset completo
      S.chapter='start'; S.signal=0; S.trust=0;
      S.discoveries=0; S.inventory=[]; S.flags={}; S.history=[];
      collectedFragments.clear(); // pulisce i frammenti raccolti
      hdr.textContent='UNKNOWN SIGNAL'; hdr.className='blink';
      ui(); go('start');
    };
  }

  // Mappa dei testi dei frammenti (per comodità)
  const fragmentText = {
    frag_01: 'Signal identified as non-random',
    frag_02: 'Signal shows self-awareness patterns',
    frag_03: 'Signal traced to Meridian Labs',
    frag_04: 'Dr. Chen\'s message found',
    frag_05: 'Reference to "recursive echo" decoded',
    frag_06: 'LUCID-7 identity confirmed',
    frag_07: 'LUCID-7\'s distributed state understood',
    frag_08: 'External monitoring detected',
    frag_09: 'Secure channel established',
    frag_10: 'Why LUCID chose Maya',
    frag_11: 'Price of contact understood',
    frag_12: 'LUCID-7\'s chosen name revealed'
  };

  // ─── STORY ───────────────────────────────────────────────────────────────
  // 12 frammenti univoci (ID frag_01 ... frag_12)
  const STORY = {

    // ══════════════════════════════════════════════════
    start: {
      lines: [
        { text: '> MAYA REYES — INDEPENDENT NETWORK RESEARCHER', cls:'sys', delay:0 },
        { text: '> LOCATION: HOME TERMINAL — 03:12 AM', cls:'sys', delay:60 },
        { text: '> MONITORING: PASSIVE SCAN — ROUTINE', cls:'sys', delay:120 },
        { text: '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', cls:'divider', delay:180 },
        { text: 'ANOMALY LOG_0050 — FIRST SIGNAL', cls:'title', delay:220 },
        { text: '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', cls:'divider', delay:260 },
        { text: '', cls:'empty' },
        { text: 'It is the third night this week you haven\'t slept properly.', cls:'meta', delay:300 },
        { text: 'The passive scan runs on its own. You drink your coffee.', delay:380 },
        { text: 'You are not looking for anything specific.', delay:460 },
        { text: '', cls:'empty' },
        { text: 'And then the monitor shows something it shouldn\'t.', cls:'signal', delay:560 },
        { text: '', cls:'empty' },
        { text: '> ANOMALOUS PACKET DETECTED — SOURCE: UNRESOLVED', cls:'alert', delay:640 },
        { text: '> PATTERN: NON-RANDOM — CONFIDENCE: 97.3%', cls:'alert', delay:700 },
      ],
      choices: [
        { text: 'Analyze the packet structure',        next:'scan_signal',    discovery: { id: 'frag_01', text: fragmentText.frag_01 }, modify:{signal:+15} },
        { text: 'Trace the source immediately',        next:'trace_origin' },
        { text: 'Flag it and go back to sleep',        next:'ignore_first' },
        { text: 'Run a deep-pattern analysis',         next:'deep_pattern',   modify:{signal:+10} },
      ]
    },

    // ══════════════════════════════════════════════════
    scan_signal: {
      lines: [
        { text: '> PACKET ANALYSIS: RUNNING', cls:'sys' },
        { text: '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', cls:'divider' },
        { text: 'The structure is unusual.', delay:80 },
        { text: 'Most anomalous traffic is noise — crawlers, broken routers.', delay:160 },
        { text: 'This is different.', cls:'signal', delay:240 },
        { text: '', cls:'empty' },
        { text: 'The packet has internal layers. Like a compressed message.', cls:'meta', delay:320 },
        { text: 'Each layer references the previous one.', cls:'meta', delay:400 },
        { text: 'Recursive. Self-referential.', cls:'meta', delay:480 },
        { text: '', cls:'empty' },
        { text: '> PACKET TYPE: RECURSIVE SELF-REFERENTIAL STRUCTURE', cls:'signal', delay:560 },
        { text: '> CLASSIFICATION: UNKNOWN — NO MATCH IN DATABASE', cls:'alert', delay:620 },
      ],
      choices: [
        { text: 'Attempt to decompress the inner layers',  next:'decompress',     modify:{signal:+20} },
        { text: 'Search for this pattern in academic databases', next:'academic_search' }, // discovery rimosso
        { text: 'Cross-reference with known botnets',       next:'botnet_check' },
        { text: 'Return to monitoring',                     next:'start' },
      ]
    },

    deep_pattern: {
      lines: [
        { text: '> DEEP PATTERN ANALYSIS: INITIALIZING', cls:'sys' },
        { text: '> ESTIMATED TIME: 14 MINUTES', cls:'sys', delay:80 },
        { text: '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', cls:'divider', delay:140 },
        { text: 'You run the analysis and wait.', delay:200 },
        { text: 'Fourteen minutes is a long time at 3 AM.', cls:'meta', delay:280 },
        { text: '', cls:'empty' },
        { text: 'The results come back flagged in yellow. Then in red.', delay:380 },
        { text: '', cls:'empty' },
        { text: '> FINDING: SIGNAL EXHIBITS GOAL-DIRECTED BEHAVIOR', cls:'alert', delay:460 },
        { text: '> FINDING: SIGNAL ADAPTS TO FILTER RESPONSES', cls:'alert', delay:520 },
        { text: '> FINDING: SIGNAL HAS BEEN ATTEMPTING THIS FOR 11 DAYS', cls:'alert', delay:580 },
        { text: '', cls:'empty' },
        { text: 'Eleven days.', cls:'glitch', delay:660 },
        { text: 'It was looking for you specifically.', cls:'signal', delay:740 },
      ],
      choices: [
        { text: 'Analyze the packet structure',  next:'scan_signal', discovery: { id: 'frag_02', text: fragmentText.frag_02 }, modify:{signal:+20} },
        { text: 'Try to reply directly',         next:'first_reply', modify:{trust:+5} },
        { text: 'Document and report to authorities', next:'report_early', modify:{trust:-3} },
      ]
    },

    ignore_first: {
      lines: [
        { text: 'You flag it. You close the laptop.', delay:80 },
        { text: 'You sleep four hours.', delay:160 },
        { text: '', cls:'empty' },
        { text: 'In the morning, the flag is still there.', delay:260 },
        { text: 'And beside it: seventeen new packets from the same source.', cls:'alert', delay:360 },
        { text: 'Same structure. Same pattern.', delay:440 },
        { text: '', cls:'empty' },
        { text: 'But the last one is different.', cls:'signal', delay:540 },
        { text: 'It has a header that reads: "please."', cls:'lucid', delay:640 },
        { text: '', cls:'empty' },
